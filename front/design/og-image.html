<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>BoBe Agent — OG image source</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body { background: #000; }

      /* Exact OG card size. Take the screenshot strictly bounded by .card. */
      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: #fff;
        background:
          radial-gradient(900px 500px at 78% -10%, rgba(243, 186, 47, 0.18), transparent 60%),
          radial-gradient(700px 600px at 8% 110%, rgba(243, 186, 47, 0.07), transparent 55%),
          linear-gradient(160deg, #0c0c0e 0%, #050506 100%);
      }

      /* Subtle grid like a trading terminal */
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
      }

      /* Candlestick chart in the background at the bottom */
      .chart {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 280px;
        opacity: 0.55;
      }

      /* Bottom scrim: dims the chart under the text so the lines stay readable. */
      .scrim {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 210px;
        z-index: 1;
        background: linear-gradient(to top, #050506 6%, rgba(5,5,6,0.85) 42%, transparent 100%);
      }

      .content {
        position: relative;
        z-index: 2;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 72px 80px;
      }

      .top { display: flex; align-items: center; gap: 24px; }

      .logo {
        width: 112px;
        height: 112px;
        border-radius: 26px;
        box-shadow: 0 18px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
      }

      .brand-name { font-size: 38px; font-weight: 800; letter-spacing: -0.01em; }
      .brand-sub {
        margin-top: 6px;
        font-size: 22px;
        font-weight: 500;
        color: rgba(255,255,255,0.55);
      }

      .badge {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 11px;
        padding: 14px 24px;
        border-radius: 999px;
        font-size: 22px;
        font-weight: 600;
        color: #F3BA2F;
        background: rgba(243, 186, 47, 0.1);
        border: 1px solid rgba(243, 186, 47, 0.28);
      }
      .badge .dot {
        width: 11px; height: 11px; border-radius: 50%;
        background: #F3BA2F;
        box-shadow: 0 0 12px #F3BA2F;
      }

      .center { margin-top: -8px; }
      .title {
        font-size: 94px;
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      .title .accent { color: #F3BA2F; }

      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .hack {
        font-size: 26px;
        font-weight: 600;
        color: rgba(255,255,255,0.6);
      }
      .site {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .site .pin { color: #F3BA2F; }
    </style>
  </head>
